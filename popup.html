<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; font-family: Arial, sans-serif; padding: 12px; margin: 0; background-color: #121212; color: white; }
    h2 { color: #4facfe; margin-top: 0; }
    textarea { width: 92%; padding: 8px; border: 1px solid #333; background: #222; color: #fff; border-radius: 4px; resize: none; }
    button { background: #4facfe; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    button:hover { background: #00f2fe; }
    #output { margin-top: 12px; font-size: 13px; line-height: 1.4; color: #ccc; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>StAige AI Coach</h2>
  <p>Paste your monologue script below for review:</p>
  <textarea id="monologueText" rows="5" placeholder="Enter text..."></textarea>
  <button id="submitBtn">Analyze Performance</button>
  <div id="output"></div>
  <script src="popup.js"></script>
</body>
</html>
